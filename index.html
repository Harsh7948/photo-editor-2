                        let finalWidth = pdfWidth;
                        let finalHeight = pdfWidth / imgRatio;
                        
                        if (finalHeight > pdfHeight) {
                            finalHeight = pdfHeight;
                            finalWidth = pdfHeight * imgRatio;
                        }
                        
                        const xOffset = (pdfWidth - finalWidth) / 2;
                        const yOffset = (pdfHeight - finalHeight) / 2;

                        if (index > 0) pdf.addPage();
                        pdf.addImage(dataUrl, 'JPEG', xOffset, yOffset, finalWidth, finalHeight);
                        resolve();
                    } else {
                        const mimeType = (quality < 1.0) ? "image/jpeg" : img.fileType;
                        const ext = (mimeType === "image/jpeg") ? "jpg" : img.fileExt;
                        const dataUrl = canvas.toDataURL(mimeType, quality);
                        const base64Data = dataUrl.split(',')[1];
                        resolve({ data: base64Data, ext: ext });
                    }
                    URL.revokeObjectURL(freshUrl);
                };
                imageObj.onerror = (err) => { URL.revokeObjectURL(freshUrl); reject(err); };
                imageObj.src = freshUrl;
            };

            const downloadAllAsPDF = async () => {
                if (images.length === 0) return;
                setIsDownloading(true);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();
                const quality = getExportQuality();

                try {
                    for (let i = 0; i < images.length; i++) {
                        await new Promise((resolve, reject) => processCanvasForDownload(images[i], resolve, reject, true, pdf, i, quality));
                    }
                    pdf.save("Edited_Photos.pdf");
                    showToast("PDF Downloaded Successfully!", "success");
                } catch (error) { 
                    showToast("Error creating PDF.", "error"); 
                } finally { setIsDownloading(false); }
            };

            const downloadAll = async () => {
                if (images.length === 0) return;
                setIsDownloading(true);
                const zip = new JSZip();
                const folder = zip.folder("Edited_Photos");
                const usedNames = new Set(); 
                const quality = getExportQuality();

                try {
                    for (let i = 0; i < images.length; i++) {
                        const img = images[i];
                        const result = await new Promise((resolve, reject) => processCanvasForDownload(img, resolve, reject, false, null, i, quality));
                        
                        let exactName = (img.nameText || 'photo').trim().replace(/[\\/:*?"<>|]/g, '');
                        let finalName = exactName;
                        let counter = 1;
                        
                        while (usedNames.has(finalName)) { finalName = `${exactName} (${counter})`; counter++; }
                        usedNames.add(finalName);
                        folder.file(`${finalName}.${result.ext}`, result.data, { base64: true });
                    }
                    const content = await zip.generateAsync({ type: "blob" });
                    saveAs(content, "Edited_Photos.zip");
                    showToast("ZIP Downloaded Successfully!", "success");
                } catch (error) { 
                    showToast("Error during download.", "error"); 
                } finally { setIsDownloading(false); }
            };

            const activeImage = images.find(img => img.id === activeImageId);
            
            const baseImagesTotalCount = images.filter(img => !img.isCollage).length;

            if (isRestoring) {
                return (
                    <div className="h-full w-full flex items-center justify-center bg-slate-50 flex-col gap-4">
                        <div className="loader"></div>
                        <h2 className="text-lg font-bold text-slate-600">Data Load Thai Rahyo Che...</h2>
                    </div>
                );
            }

            return (
                <div className="h-full w-full flex flex-col xl:flex-row gap-4 relative p-2 md:p-4 box-border">

                    {/* Toast Notification */}
                    {toast && (
                        <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-[9999] px-6 py-3 rounded-full shadow-2xl font-bold text-sm text-white toast-animate ${toast.type === 'error' ? 'bg-red-500' : 'bg-green-500'}`}>
                            {toast.msg}
                        </div>
                    )}

                    {/* LEFT SIDEBAR - Upload, Watermark, Filters, Download */}
                    <div className="w-full xl:w-[280px] bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] flex flex-col z-20 h-full flex-shrink-0 border border-slate-100 overflow-hidden">
                        
                        {/* Header Gradient */}
                        <div className="p-5 bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-600 text-white relative overflow-hidden flex-shrink-0">
                            <h1 className="text-xl font-[Poppins] font-bold mb-1 relative z-10">Creator Studio</h1>
                            <p className="text-blue-100 text-xs mb-3 font-light relative z-10">Premium Edit & Watermark</p>
                            
                            <div className="inline-flex items-center gap-1.5 bg-white/10 px-3 py-1 rounded-full text-[10px] font-medium border border-white/20 backdrop-blur-md relative z-10 shadow-sm">
                                <span className="text-blue-50">Created by</span>
                                <span className="text-yellow-400 font-extrabold tracking-widest uppercase">Harsh</span>
                            </div>
                        </div>

                        <div className="p-4 flex-1 overflow-y-auto min-h-0 flex flex-col gap-5 custom-scrollbar bg-slate-50/50">
                            
                            {/* Upload Button */}
                            <div className="relative group">
                                <div className="absolute inset-0 bg-blue-500 rounded-xl blur opacity-20 group-hover:opacity-40 transition duration-300"></div>
                                <label className="relative flex flex-col items-center justify-center gap-2 p-3 bg-white border-2 border-dashed border-blue-200 rounded-xl cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all duration-300 shadow-sm">
                                    <div className="w-8 h-8 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform duration-300">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                                    </div>
                                    <span className="font-semibold text-slate-700 text-xs">Upload Photos</span>
                                    <input type="file" multiple accept="image/*" onChange={handleUpload} className="hidden" />
                                </label>
                            </div>

                            {/* WATERMARK SETTINGS */}
                            {(activeImage && !isCollageMode) && (
                                <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-2">
                                    <div className="flex items-center justify-between mb-1">
                                        <h3 className="font-[Poppins] font-bold text-slate-800 text-xs flex items-center gap-1.5">
                                            <span className="p-1 bg-blue-100 text-blue-600 rounded">
                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                            </span>
                                            Watermark Setup
                                        </h3>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={globalSettings.showWatermark} onChange={(e) => setGlobalSettings({...globalSettings, showWatermark: e.target.checked})} />
                                            <div className="w-8 h-4 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-blue-600"></div>
                                        </label>
                                    </div>

                                    <div className={`space-y-2 transition-all duration-300 ${!globalSettings.showWatermark ? 'opacity-40 pointer-events-none' : ''}`}>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="relative">
                                                <div 
                                                    onClick={() => setIsFontDropdownOpen(!isFontDropdownOpen)}
                                                    className="w-full p-2 bg-slate-50 border border-slate-200 shadow-sm rounded-lg text-[10px] flex justify-between items-center cursor-pointer"
                                                >
                                                    <span className="truncate" style={{fontFamily: globalSettings.fontFamily}}>{globalSettings.fontFamily}</span>
                                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                                                </div>
                                                {isFontDropdownOpen && <div className="fixed inset-0 z-40" onClick={() => setIsFontDropdownOpen(false)}></div>}
                                                {isFontDropdownOpen && (
                                                    <div className="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden">
                                                        {fontOptions.map((f) => (
                                                            <div
                                                                key={f}
                                                                onClick={() => { setGlobalSettings({...globalSettings, fontFamily: f}); setIsFontDropdownOpen(false); }}
                                                                style={{fontFamily: f}}
                                                                className={`p-2 text-xs cursor-pointer hover:bg-slate-50 border-b border-slate-100 ${globalSettings.fontFamily === f ? 'text-blue-600 bg-blue-50' : 'text-slate-700'}`}
                                                            >
                                                                {f}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>

                                            <div className="relative">
                                                <div 
                                                    onClick={() => setIsPosDropdownOpen(!isPosDropdownOpen)}
                                                    className="w-full p-2 bg-slate-50 border border-slate-200 shadow-sm rounded-lg text-[10px] flex justify-between items-center cursor-pointer"
                                                >
                                                    <span className="truncate">{positionOptions.find(opt => opt.value === globalSettings.position)?.label}</span>
                                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                                                </div>
                                                {isPosDropdownOpen && <div className="fixed inset-0 z-40" onClick={() => setIsPosDropdownOpen(false)}></div>}
                                                {isPosDropdownOpen && (
                                                    <div className="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden">
                                                        {positionOptions.map((opt) => (
                                                            <div
                                                                key={opt.value}
                                                                onMouseEnter={() => setGlobalSettings(prev => ({ ...prev, hoverPosition: opt.value }))}
                                                                onMouseLeave={() => setGlobalSettings(prev => ({ ...prev, hoverPosition: null }))}
                                                                onClick={() => {
                                                                    setGlobalSettings(prev => ({ ...prev, position: opt.value, hoverPosition: null }));
                                                                    setImages(prev => prev.map(img => ({ ...img, customWatermarkPos: null })));
                                                                    setIsPosDropdownOpen(false);
                                                                }}
                                                                className={`p-2 text-xs cursor-pointer border-b border-slate-100 ${globalSettings.position === opt.value ? 'bg-blue-50 text-blue-600' : 'hover:bg-slate-50 text-slate-700'}`}
                                                            >
                                                                {opt.label}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div> <div className="flex items-center gap-2">
                                            <input 
                                                type="number" min="0" max="100" 
                                                value={globalSettings.fontSize} 
                                                onChange={(e) => {
                                                    let val = parseInt(e.target.value, 10);
                                                    setGlobalSettings({...globalSettings, fontSize: isNaN(val) ? 0 : Math.max(0, val)});
                                                }}
                                                className="flex-1 bg-slate-50 p-2 rounded-lg border border-slate-200 shadow-sm text-center font-bold text-slate-700 text-xs outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/50"
                                            />
                                            <div className="h-8 w-12 rounded-lg overflow-hidden border border-slate-200 shadow-sm relative cursor-pointer">
                                                <input type="color" value={globalSettings.color} onChange={(e) => setGlobalSettings({...globalSettings, color: e.target.value})} className="absolute -top-2 -left-2 w-[150%] h-[150%] cursor-pointer"/>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* FILTERS SECTION */}
                            {(activeImage && !isCollageMode) && (
                                <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-2">
                                    <div className="flex items-center justify-between mb-1">
                                        <h3 className="font-[Poppins] font-bold text-slate-800 text-xs flex items-center gap-1.5">
                                            <span className="p-1 bg-purple-100 text-purple-600 rounded">
                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                                            </span>
                                            Image Filters
                                        </h3>
                                        <button onClick={resetActivePhotoFilters} title="Reset filters" className="text-[8px] text-slate-500 hover:text-red-500 font-bold bg-slate-50 border border-slate-200 px-1.5 py-0.5 rounded shadow-sm transition-colors">
                                            RESET
                                        </button>
                                    </div>

                                    <div className="flex flex-col gap-1">
                                        <div className="flex items-center gap-2">
                                            <span className="text-[9px] font-bold text-slate-500 uppercase w-14">Bright</span>
                                            <input type="range" min="0" max="200" value={activeImage.brightness} onChange={(e) => updateImage(activeImage.id, 'brightness', parseInt(e.target.value) || 0)} className="flex-1" />
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-[9px] font-bold text-slate-500 uppercase w-14">Contrast</span>
                                            <input type="range" min="0" max="200" value={activeImage.contrast} onChange={(e) => updateImage(activeImage.id, 'contrast', parseInt(e.target.value) || 0)} className="flex-1" />
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-[9px] font-bold text-slate-500 uppercase w-14">Saturate</span>
                                            <input type="range" min="0" max="200" value={activeImage.saturation} onChange={(e) => updateImage(activeImage.id, 'saturation', parseInt(e.target.value) || 0)} className="flex-1" />
                                        </div>
                                    </div>

                                    <button onClick={applyFiltersToAll} className="w-full py-1.5 bg-slate-50 hover:bg-purple-50 text-slate-600 hover:text-purple-600 font-semibold rounded-lg shadow-sm transition-colors text-[10px] border border-slate-200">
                                        Apply Filters to All Photos
                                    </button>
                                </div>
                            )}

                            {/* DOWNLOAD SECTION */}
                            {(images.length > 0 && !isCollageMode) && (
                                <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-2 mt-auto border-t-0">
                                    <h3 className="font-[Poppins] font-bold text-slate-800 text-xs flex items-center gap-1.5 mb-1">
                                        <span className="p-1 bg-green-100 text-green-600 rounded">
                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                                        </span>
                                        Download All
                                    </h3>
                                    
                                    <div className="flex justify-between items-center pb-1 border-b border-slate-100">
                                        <span className="text-[9px] font-bold text-slate-500 uppercase">Total Size</span>
                                        <span className="text-[10px] font-black text-blue-600">{totalOriginalSizeMB.toFixed(2)} MB</span>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="flex items-center gap-2 cursor-pointer group">
                                            <div className="relative flex items-center justify-center">
                                                <input type="radio" name="compMode" checked={!compression.enabled} onChange={() => setCompression({...compression, enabled: false, targetMB: ''})} className="peer appearance-none w-4 h-4 border-2 border-slate-300 rounded-full checked:border-blue-600" />
                                                <div className="absolute w-2 h-2 bg-blue-600 rounded-full opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                                            </div>
                                            <span className="text-[11px] font-semibold text-slate-700 group-hover:text-blue-600 transition-colors">Original Quality</span>
                                        </label>
                                        <label className="flex items-center gap-2 cursor-pointer group">
                                            <div className="relative flex items-center justify-center">
                                                <input 
                                                    type="radio" 
                                                    name="compMode" 
                                                    checked={compression.enabled} 
                                                    onChange={() => setCompression({
                                                        ...compression, 
                                                        enabled: true, 
                                                        targetMB: compression.targetMB || totalOriginalSizeMB.toFixed(2)
                                                    })} 
                                                    className="peer appearance-none w-4 h-4 border-2 border-slate-300 rounded-full checked:border-blue-600" 
                                                />
                                                <div className="absolute w-2 h-2 bg-blue-600 rounded-full opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                                            </div>
                                            <span className="text-[11px] font-semibold text-slate-700 group-hover:text-blue-600 transition-colors">Compress Size</span>
                                        </label>
                                        {compression.enabled && (
                                            <div className="pl-6 pt-1 flex items-center gap-2">
                                                <input 
                                                    type="number" 
                                                    step="0.01"
                                                    placeholder="Eg. 5.5" 
                                                    value={compression.targetMB} 
                                                    onChange={e => setCompression({...compression, targetMB: e.target.value})} 
                                                    className="w-20 p-1.5 text-xs border border-slate-300 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-center font-bold bg-slate-50" 
                                                />
                                                <span className="text-[10px] font-bold text-slate-500">MB</span>
                                            </div>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-2 gap-1.5 mt-1">
                                        <button onClick={downloadAllAsPDF} disabled={isDownloading} className="w-full py-2 bg-indigo-500 hover:bg-indigo-600 active:scale-95 disabled:opacity-70 text-white font-semibold rounded-lg shadow-sm transition-all flex flex-col items-center justify-center gap-1 text-[10px]">
                                            {isDownloading ? (
                                                <svg className="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                                            ) : (
                                                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-6"/><path d="M9 15l3 3 3-3"/></svg>
                                            )}
                                            <span>Save PDF</span>
                                        </button>
                                        <button onClick={downloadAll} disabled={isDownloading} className="w-full py-2 bg-blue-500 hover:bg-blue-600 active:scale-95 disabled:opacity-70 text-white font-semibold rounded-lg shadow-sm transition-all flex flex-col items-center justify-center gap-1 text-[10px]">
                                            {isDownloading ? (
                                                <svg className="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                                            ) : (
                                                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                                            )}
                                            <span>Save ZIP</span>
                                        </button>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>

                    {/* Center Main Content Area (Canvas & Thumbnails) */}
                    <div className="flex-1 h-full overflow-hidden flex flex-col gap-3 relative">
                        <div className="flex-1 overflow-hidden flex flex-col bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-2 md:p-4 min-h-0">
                            <div className="flex items-center justify-between mb-3 px-2 flex-shrink-0">
                                <div>
                                    <h2 className="text-xl font-[Poppins] font-bold text-slate-800">
                                        {isCollageMode ? 'Collage Editor Mode' : 'Studio Workspace'}
                                    </h2>
                                    <p className="text-slate-500 text-xs mt-0.5">
                                        {isCollageMode ? 'Scroll over photo to zoom. Drag to move.' : 'Select photo to edit'}
                                    </p>
                                </div>
                                {/* NEW LOCATION FOR RESET BUTTON */}
                                {images.length > 0 && (
                                    <button onClick={clearAllImages} className="text-[10px] text-red-500 hover:text-white font-bold px-3 py-1.5 bg-red-50 hover:bg-red-500 rounded-lg border border-red-200 transition-colors flex items-center gap-1.5 shadow-sm">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                        Reset Workspace
                                    </button>
                                )}
                            </div>

                            {images.length === 0 ? (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-400 bg-slate-50 rounded-2xl m-1 border-2 border-dashed border-slate-200">
                                    <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-sm mb-4">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="text-slate-300"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                                    </div>
                                    <p className="text-lg font-[Poppins] font-semibold text-slate-600">Workspace is empty</p>
                                    <p className="text-xs mt-1 text-slate-400">Upload images from the left panel to start editing.</p>
                                </div>
                            ) : (
                                <div className="flex-1 flex flex-col min-h-0">
                                    {(activeImage || isCollageMode) && (
                                        <div className="flex-1 rounded-2xl relative overflow-hidden border border-slate-200 shadow-inner bg-slate-100">
                                            <CanvasPreview 
                                                image={activeImage} 
                                                images={images}
                                                selectedCollageIds={selectedCollageIds}
                                                globalSettings={globalSettings} 
                                                updateImage={updateImage} 
                                                isCollageMode={isCollageMode}
                                                collageSettings={collageSettings}
                                                collageState={collageState}
                                                setCollageState={setCollageState}
                                            />
                                            {(!globalSettings.showWatermark && !isCollageMode) && (
                                                <div className="absolute top-4 left-4 bg-slate-900/80 text-white text-[10px] uppercase font-bold px-3 py-1.5 rounded-full shadow-lg backdrop-blur-md flex items-center gap-1 z-40 pointer-events-none">
                                                    <div className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></div>
                                                    Watermark Disabled
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Horizontal Thumbnails Dock */}
                        {(images.length > 0 && !isCollageMode) && (
                            <div className="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-3 flex-shrink-0">
                                <div className="flex items-center justify-between mb-2 px-1">
                                    <span className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">{images.length} PHOTOS</span>
                                </div>
                                <div className="flex gap-3 overflow-x-auto w-full custom-scrollbar pb-2 pt-1 px-1">
                                    {images.map(img => (
                                        <div 
                                            key={img.id}
                                            onClick={() => {
                                                setActiveImageId(img.id);
                                                setIsCollageMode(false);
                                            }} 
                                            className={`flex-shrink-0 w-[100px] flex flex-col bg-white border cursor-pointer rounded-xl overflow-hidden transition-all duration-300
                                                ${(img.id === activeImageId && !isCollageMode) ? 'border-blue-500 ring-2 ring-blue-500 shadow-md transform -translate-y-1' : 'border-slate-200 shadow-sm hover:-translate-y-1 hover:shadow-md'}
                                            `}
                                        >
                                            {/* Image Preview Container */}
                                            <div className="h-[100px] w-full relative group bg-white">
                                                <img 
                                                    src={img.originalUrl} 
                                                    className="w-full h-full object-contain p-1" 
                                                    style={{ filter: `brightness(${img.brightness}%) contrast(${img.contrast}%) saturate(${img.saturation}%)` }}
                                                    alt="Thumbnail" 
                                                />
                                                
                                                {/* Hover Overlay with Actions */}
                                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center gap-2 transition-opacity z-20">
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); setActiveImageId(img.id); setIsCollageMode(false); }}
                                                        className="p-1.5 bg-blue-500 text-white rounded-full hover:bg-blue-600 hover:scale-110 transition-transform"
                                                        title="Edit Photo"
                                                    >
                                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                                    </button>
                                                    <button 
                                                        onClick={(e) => deleteImage(e, img.id)}
                                                        className="p-1.5 bg-red-500 text-white rounded-full hover:bg-red-600 hover:scale-110 transition-transform"
                                                        title="Delete Photo"
                                                    >
                                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                                    </button>
                                                </div>

                                                {/* Status Badges */}
                                                {(img.id === activeImageId && !isCollageMode) && (
                                                    <div className="absolute top-1 left-1 bg-blue-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded shadow-sm z-10">EDITING</div>
                                                )}
                                                {img.isCollage && (
                                                    <div className="absolute bottom-1 right-1 bg-indigo-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded shadow-sm z-10">GRID</div>
                                                )}
                                            </div>
                                            
                                            {/* Name Input Below Image */}
                                            <div className="p-1.5 border-t border-slate-100 bg-white">
                                                <input 
                                                    type="text" 
                                                    value={img.nameText}
                                                    onChange={(e) => updateImage(img.id, 'nameText', e.target.value)}
                                                    className="w-full text-[10px] font-semibold text-slate-700 text-center bg-transparent border-none outline-none focus:ring-1 focus:ring-blue-500 rounded p-0.5"
                                                    placeholder="Name..."
                                                />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* RIGHT SIDEBAR - Tools */}
                    {(images.length > 0) && (
                        <div className="w-full xl:w-[320px] bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] flex flex-col z-20 h-full flex-shrink-0 border border-slate-100 overflow-hidden">
                            <div className="p-4 flex-1 overflow-y-auto min-h-0 flex flex-col gap-4 custom-scrollbar bg-slate-50/50">
                                
                                {/* 1. TAG REMOVER SECTION (Hidden in Collage Mode) */}
                                {(!isCollageMode && activeImage) && (
                                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-3">
                                        <div className="flex items-center justify-between mb-1">
                                            <h3 className="font-[Poppins] font-bold text-slate-800 text-sm flex items-center gap-2">
                                                <span className="p-1.5 bg-orange-100 text-orange-600 rounded-lg">
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
                                                </span>
                                                Tag Remover
                                            </h3>
                                            
                                            {/* Undo / Redo / Clear Controls */}
                                            <div className="flex items-center gap-1">
                                                <button onClick={handleUndo} disabled={!activeImage.eraserStrokes?.length} className="p-1 bg-slate-50 hover:bg-slate-200 text-slate-600 rounded border border-slate-200 disabled:opacity-40 transition-colors" title="Undo">
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                                                </button>
                                                <button onClick={handleRedo} disabled={!activeImage.redoStrokes?.length} className="p-1 bg-slate-50 hover:bg-slate-200 text-slate-600 rounded border border-slate-200 disabled:opacity-40 transition-colors" title="Redo">
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
                                                </button>
                                                <button onClick={clearAllStrokes} disabled={!activeImage.eraserStrokes?.length && !activeImage.redoStrokes?.length} className="ml-1 text-[9px] text-red-500 hover:text-white font-bold bg-red-50 hover:bg-red-500 border border-red-200 px-1.5 py-1 rounded transition-colors disabled:opacity-50">
                                                    CLEAR
                                                </button>
                                            </div>
                                        </div>

                                        <button 
                                            onClick={() => setGlobalSettings({...globalSettings, isEraserMode: !globalSettings.isEraserMode})}
                                            className={`w-full py-2 font-semibold rounded-lg transition-all duration-300 text-xs border shadow-sm ${globalSettings.isEraserMode ? 'bg-orange-500 text-white border-orange-500' : 'bg-slate-50 hover:bg-orange-50 text-slate-700 border-slate-200'}`}
                                        >
                                            {globalSettings.isEraserMode ? 'Turn Off Brush' : 'Turn On Smart Brush'}
                                        </button>

                                        {globalSettings.isEraserMode && (
                                            <div className="flex flex-col gap-3 mt-1 p-3 bg-slate-50 rounded-lg border border-slate-200 shadow-sm">
                                                
                                                <div className="flex bg-white p-1 rounded border border-slate-200">
                                                    <button 
                                                        onClick={() => setGlobalSettings({...globalSettings, eraserType: 'auto'})}
                                                        className={`flex-1 py-1.5 text-[10px] font-bold rounded transition-colors ${globalSettings.eraserType === 'auto' ? 'bg-orange-100 text-orange-600' : 'text-slate-500 hover:text-slate-700'}`}
                                                    >
                                                        ðŸŽ¯ Auto Color
                                                    </button>
                                                    <button 
                                                        onClick={() => setGlobalSettings({...globalSettings, eraserType: 'blur'})}
                                                        className={`flex-1 py-1.5 text-[10px] font-bold rounded transition-colors ${globalSettings.eraserType === 'blur' ? 'bg-orange-100 text-orange-600' : 'text-slate-500 hover:text-slate-700'}`}
                                                    >
                                                        ðŸª„ Blur Smudge
                                                    </button>
                                                </div>

                                                <div className="flex flex-col gap-1.5">
                                                    <div className="flex justify-between text-[10px] font-bold text-slate-500 uppercase">
                                                        <span>Brush Size</span>
                                                        <span className="text-orange-600">{globalSettings.eraserSize}%</span>
                                                    </div>
                                                    <input type="range" min="1" max="50" value={globalSettings.eraserSize} onChange={(e) => setGlobalSettings({...globalSettings, eraserSize: parseInt(e.target.value) || 1})} className="flex-1" style={{accentColor: '#f97316'}} />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* 2. PHOTO COLLAGE MAKER (LIVE EDITOR) */}
                                {baseImagesTotalCount > 1 && (
                                    <div className={`bg-white p-4 rounded-xl shadow-sm border flex flex-col gap-3 ${isCollageMode ? 'border-indigo-500 ring-1 ring-indigo-500' : 'border-slate-200'}`}>
                                        <div className="flex items-center justify-between mb-1">
                                            <h3 className="font-[Poppins] font-bold text-slate-800 text-sm flex items-center gap-2">
                                                <span className="p-1.5 bg-indigo-100 text-indigo-600 rounded-lg">
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                                                </span>
                                                Collage Maker
                                            </h3>
                                        </div>

                                        {!isCollageMode ? (
                                            <div className="flex flex-col gap-2">
                                                <label className="text-[10px] font-bold text-slate-500 uppercase">Select Photos for Collage</label>
                                                <div className="max-h-32 overflow-y-auto bg-slate-50 border border-slate-200 rounded-lg p-2 flex flex-col gap-1 custom-scrollbar">
                                                    {images.filter(img => !img.isCollage).map(img => (
                                                        <label key={img.id} className="flex items-center gap-2 cursor-pointer hover:bg-slate-100 p-1 rounded">
                                                            <input type="checkbox" className="accent-indigo-500"
                                                                checked={selectedCollageIds.includes(img.id)}
                                                                onChange={(e) => {
                                                                    if(e.target.checked) setSelectedCollageIds(prev => [...prev, img.id]);
                                                                    else setSelectedCollageIds(prev => prev.filter(id => id !== img.id));
                                                                }}
                                                            />
                                                            <span className="text-[11px] text-slate-700 truncate">{img.nameText}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                                <button 
                                                    onClick={startCollageEditor}
                                                    className="w-full py-2 mt-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold rounded-lg shadow-sm transition-all text-xs border border-indigo-200"
                                                >
                                                    Enter Collage Editor
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col gap-4 animate-fadeIn">
                                                {/* Visual Layout Buttons */}
                                                <div>
                                                    <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1.5">Select Layout</label>
                                                    <div className="flex items-center gap-1.5 flex-wrap">
                                                        {/* Grid */}
                                                        <button onClick={() => updateCollageSetting('layout', 'grid')} className={`collage-btn w-[45px] ${collageSettings.layout === 'grid' ? 'active' : ''}`} title="Grid Square">
                                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/></svg>
                                                        </button>
                                                        {/* Split H */}
                                                        <button onClick={() => updateCollageSetting('layout', 'split-h')} className={`collage-btn w-[45px] ${collageSettings.layout === 'split-h' ? 'active' : ''}`} title="Split Horizontal">
                                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="8"/><rect x="3" y="13" width="18" height="8"/></svg>
                                                        </button>
                                                        {/* Split V */}
                                                        <button onClick={() => updateCollageSetting('layout', 'split-v')} className={`collage-btn w-[45px] ${collageSettings.layout === 'split-v' ? 'active' : ''}`} title="Split Vertical">
                                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="18"/><rect x="13" y="3" width="8" height="18"/></svg>
                                                        </button>
                                                        
                                                        {/* Custom Layouts available if 3+ photos */}
                                                        {selectedCollageIds.length >= 3 && (
                                                            <button onClick={() => updateCollageSetting('layout', 'insta-1')} className={`collage-btn w-[45px] ${collageSettings.layout === 'insta-1' ? 'active' : ''}`} title="1 Top, 2 Bottom">
                                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="8"/><rect x="3" y="13" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/></svg>
                                                            </button>
                                                        )}
                                                        {selectedCollageIds.length >= 3 && (
                                                            <button onClick={() => updateCollageSetting('layout', 'insta-2')} className={`collage-btn w-[45px] ${collageSettings.layout === 'insta-2' ? 'active' : ''}`} title="1 Left, 2 Right">
                                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="18"/><rect x="13" y="3" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/></svg>
                                                            </button>
                                                        )}
                                                        {selectedCollageIds.length >= 3 && (
                                                            <button onClick={() => updateCollageSetting('layout', 'insta-3')} className={`collage-btn w-[45px] ${collageSettings.layout === 'insta-3' ? 'active' : ''}`} title="2 Top, 1 Bottom">
                                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="18" height="8"/></svg>
                                                            </button>
                                                        )}
                                                        {selectedCollageIds.length >= 4 && (
                                                            <button onClick={() => updateCollageSetting('layout', 'insta-4')} className={`collage-btn w-[45px] ${collageSettings.layout === 'insta-4' ? 'active' : ''}`} title="1 Top, 3 Bottom">
                                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="8"/><rect x="3" y="13" width="5" height="8"/><rect x="9.5" y="13" width="5" height="8"/><rect x="16" y="13" width="5" height="8"/></svg>
                                                            </button>
                                                        )}
                                                        {selectedCollageIds.length >= 4 && (
                                                            <button onClick={() => updateCollageSetting('layout', 'insta-5')} className={`collage-btn w-[45px] ${collageSettings.layout === 'insta-5' ? 'active' : ''}`} title="1 Left, 3 Right">
                                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="18"/><rect x="13" y="3" width="8" height="5"/><rect x="13" y="9.5" width="8" height="5"/><rect x="13" y="16" width="8" height="5"/></svg>
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>

                                                <div className="flex items-center justify-between">
                                                    <label className="text-[10px] font-bold text-slate-500 uppercase">Image Fit</label>
                                                    <div className="flex bg-slate-100 p-0.5 rounded border border-slate-200">
                                                        <button 
                                                            onClick={() => updateCollageSetting('imageFit', 'cover')}
                                                            className={`px-3 py-1 text-[10px] font-bold rounded transition-colors ${collageSettings.imageFit === 'cover' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}
                                                        >Fill Box</button>
                                                        <button 
                                                            onClick={() => updateCollageSetting('imageFit', 'contain')}
                                                            className={`px-3 py-1 text-[10px] font-bold rounded transition-colors ${collageSettings.imageFit === 'contain' ? 'bg-slate-800 shadow-sm text-white' : 'text-slate-500'}`}
                                                        >Fit Photo</button>
                                                    </div>
                                                </div>

                                                <div className="flex flex-col gap-1.5">
                                                    <div className="flex justify-between text-[10px] font-bold text-slate-500 uppercase">
                                                        <span>Border Size</span>
                                                        <span className="text-indigo-600">{collageSettings.borderSize}px</span>
                                                    </div>
                                                    <input type="range" min="0" max="50" value={collageSettings.borderSize} onChange={(e) => updateCollageSetting('borderSize', parseInt(e.target.value) || 0)} className="flex-1" style={{accentColor: '#4f46e5'}} />
                                                </div>

                                                <div className="flex items-center justify-between">
                                                    <label className="text-[10px] font-bold text-slate-500 uppercase">Border Color</label>
                                                    <div className="flex bg-slate-100 p-0.5 rounded border border-slate-200">
                                                        <button 
                                                            onClick={() => updateCollageSetting('borderColor', '#ffffff')}
                                                            className={`px-3 py-1 text-[10px] font-bold rounded transition-colors ${collageSettings.borderColor === '#ffffff' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}
                                                        >White</button>
                                                        <button 
                                                            onClick={() => updateCollageSetting('borderColor', '#000000')}
                                                            className={`px-3 py-1 text-[10px] font-bold rounded transition-colors ${collageSettings.borderColor === '#000000' ? 'bg-slate-800 shadow-sm text-white' : 'text-slate-500'}`}
                                                        >Black</button>
                                                    </div>
                                                </div>

                                                <div className="flex items-center justify-between border-t border-slate-100 pt-2">
                                                    <label className="text-[10px] font-bold text-slate-500 uppercase">Show Names</label>
                                                    <label className="relative inline-flex items-center cursor-pointer">
                                                        <input type="checkbox" className="sr-only peer" checked={collageSettings.showNames} onChange={(e) => updateCollageSetting('showNames', e.target.checked)} />
                                                        <div className="w-7 h-4 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-500"></div>
                                                    </label>
                                                </div>

                                                {/* COLLAGE TEXT WATERMARK SETTINGS */}
                                                {collageSettings.showNames && (
                                                    <div className="flex flex-col gap-2 mt-1 p-3 bg-slate-50 rounded-lg border border-slate-200">
                                                        <div className="grid grid-cols-2 gap-2">
                                                            <div className="relative">
                                                                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 block">Font Family</label>
                                                                <div 
                                                                    onClick={() => setIsCollageFontDropdownOpen(!isCollageFontDropdownOpen)}
                                                                    className="w-full p-2 bg-white border border-slate-200 shadow-sm rounded-lg text-[10px] flex justify-between items-center cursor-pointer"
                                                                >
                                                                    <span className="truncate" style={{fontFamily: collageSettings.textFont}}>{collageSettings.textFont}</span>
                                                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                                                                </div>
                                                                {isCollageFontDropdownOpen && <div className="fixed inset-0 z-40" onClick={() => setIsCollageFontDropdownOpen(false)}></div>}
                                                                {isCollageFontDropdownOpen && (
                                                                    <div className="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden">
                                                                        {fontOptions.map((f) => (
                                                                            <div
                                                                                key={f}
                                                                                onClick={() => { updateCollageSetting('textFont', f); setIsCollageFontDropdownOpen(false); }}
                                                                                style={{fontFamily: f}}
                                                                                className={`p-2 text-[10px] cursor-pointer border-b border-slate-100 ${collageSettings.textFont === f ? 'bg-indigo-50 text-indigo-600' : 'hover:bg-slate-50 text-slate-700'}`}
                                                                            >
                                                                                {f}
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>

                                                            <div className="relative">
                                                                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 block">Position</label>
                                                                <div 
                                                                    onClick={() => setIsCollagePosDropdownOpen(!isCollagePosDropdownOpen)}
                                                                    className="w-full p-2 bg-white border border-slate-200 shadow-sm rounded-lg text-[10px] flex justify-between items-center cursor-pointer"
                                                                >
                                                                    <span className="truncate">{positionOptions.find(opt => opt.value === collageSettings.textPosition)?.label}</span>
                                                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                                                                </div>
                                                                {isCollagePosDropdownOpen && <div className="fixed inset-0 z-40" onClick={() => setIsCollagePosDropdownOpen(false)}></div>}
                                                                {isCollagePosDropdownOpen && (
                                                                    <div className="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden">
                                                                        {positionOptions.map((opt) => (
                                                                            <div
                                                                                key={opt.value}
                                                                                onClick={() => {
                                                                                    updateCollageSetting('textPosition', opt.value);
                                                                                    updateCollageSetting('hoverTextPosition', null); // Clear hover on select
                                                                                    setCollageState(prev => {
                                                                                        const next = {...prev};
                                                                                        Object.keys(next).forEach(k => {
                                                                                            next[k] = {...next[k], textX: null, textY: null};
                                                                                        });
                                                                                        return next;
                                                                                    });
                                                                                    setIsCollagePosDropdownOpen(false);
                                                                                }}
                                                                                onMouseEnter={() => updateCollageSetting('hoverTextPosition', opt.value)}
                                                                                onMouseLeave={() => updateCollageSetting('hoverTextPosition', null)}
                                                                                className={`p-2 text-[10px] cursor-pointer border-b border-slate-100 ${collageSettings.textPosition === opt.value ? 'bg-indigo-50 text-indigo-600' : 'hover:bg-slate-50 text-slate-700'}`}
                                                                            >
                                                                                {opt.label}
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>

                                                        <div className="flex items-center gap-2">
                                                            <div className="flex-1">
                                                                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 block">Font Size</label>
                                                                <input 
                                                                    type="number" min="0" max="200" 
                                                                    value={collageSettings.textSize} 
                                                                    onChange={(e) => updateCollageSetting('textSize', parseInt(e.target.value, 10) || 0)}
                                                                    className="w-full bg-white p-2 rounded-lg border border-slate-200 shadow-sm text-center font-bold text-slate-700 text-xs outline-none focus:ring-2 focus:ring-indigo-500/50"
                                                                />
                                                            </div>
                                                            <div>
                                                                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 block">Text Color</label>
                                                                <div className="flex bg-white p-0.5 rounded border border-slate-200 shadow-sm">
                                                                    <button 
                                                                        onClick={() => updateCollageSetting('textColor', '#000000')}
                                                                        className={`px-2 py-1 text-[10px] font-bold rounded transition-colors ${collageSettings.textColor === '#000000' ? 'bg-slate-800 text-white' : 'text-slate-500'}`}
                                                                    >Black</button>
                                                                    <button 
                                                                        onClick={() => updateCollageSetting('textColor', '#ffffff')}
                                                                        className={`px-2 py-1 text-[10px] font-bold rounded transition-colors ${collageSettings.textColor === '#ffffff' ? 'bg-gray-200 text-slate-800' : 'text-slate-500'}`}
                                                                    >White</button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}

                                                <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                                    <p className="text-[10px] text-slate-600 font-medium text-center leading-tight">
                                                        ðŸ’¡ <strong>Drag photos</strong> inside the grid.<br/> 
                                                        ðŸ’¡ <strong>Drag names</strong> to move text freely.
                                                    </p>
                                                </div>

                                                <div className="flex gap-2 mt-2">
                                                    <button 
                                                        onClick={() => setIsCollageMode(false)}
                                                        className="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-lg transition-colors text-xs border border-slate-300"
                                                    >
                                                        Cancel
                                                    </button>
                                                    <button 
                                                        onClick={saveCollage} 
                                                        disabled={isCreatingCollage}
                                                        className="flex-[2] py-2 bg-indigo-500 hover:bg-indigo-600 active:scale-95 disabled:opacity-70 text-white font-bold rounded-lg shadow-md transition-all text-xs flex justify-center items-center gap-1.5"
                                                    >
                                                        {isCreatingCollage ? (
                                                            <><svg className="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Saving...</>
                                                        ) : (
                                                            <>Save Collage</>
                                                        )}
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
