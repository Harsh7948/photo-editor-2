<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Photo Editor & Watermark</title>
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Changed to CDNJS for better loading in India) -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <!-- JSZip & FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- LocalForage for DB Engine (Persistent Storage) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
            border: 2px solid white;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
        input[type=range]:focus { outline: none; }

        /* Hide number input spinners */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* Checkerboard for transparent images */
        .checkerboard-bg {
            background-image: 
                linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .touch-none { touch-action: none; }
        
        /* Toast Animation */
        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .toast-animate {
            animation: slideDown 0.3s ease-out forwards;
        }

        .collage-btn {
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #64748b;
        }
        .collage-btn:hover {
            background: #e0e7ff;
            color: #4f46e5;
            border-color: #c7d2fe;
        }
        .collage-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        
        /* Loader Animation */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    
    <!-- Added a Loading State -->
    <div id="root" class="h-full w-full box-border">
        <div class="h-full w-full flex flex-col items-center justify-center bg-[#f1f5f9]">
            <h2 class="text-xl font-bold text-gray-400 animate-pulse mt-10">Loading App... Please wait...</h2>
            <p class="text-xs text-gray-500 mt-2">Jo aa screen ghani vaar rahe, to tamaru internet connection check karo.</p>
        </div>
    </div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // Eraser Strokes Utility
        const applyEraserStrokes = (ctx, canvas, strokes) => {
            if (!strokes || strokes.length === 0) return;

            ctx.save();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            strokes.forEach(stroke => {
                if ((stroke.type === 'color' || stroke.type === 'auto') && stroke.points && stroke.points.length > 0) {
                    ctx.strokeStyle = stroke.color || '#ffffff'; 
                    ctx.fillStyle = stroke.color || '#ffffff';   
                    const actualSize = (stroke.size / 100) * canvas.width;
                    ctx.lineWidth = actualSize;
                    
                    ctx.beginPath();
                    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
                    for (let i = 1; i < stroke.points.length; i++) {
                        ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
                    }
                    ctx.stroke();
                    if(stroke.points.length === 1) {
                        ctx.beginPath();
                        ctx.arc(stroke.points[0].x, stroke.points[0].y, actualSize / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
            ctx.restore();

            const blurStrokes = strokes.filter(s => s.type === 'blur');
            if (blurStrokes.length > 0) {
                const maskCanvas = document.createElement('canvas');
                maskCanvas.width = canvas.width;
                maskCanvas.height = canvas.height;
                const maskCtx = maskCanvas.getContext('2d');
                maskCtx.lineCap = 'round';
                maskCtx.lineJoin = 'round';
                maskCtx.fillStyle = 'white';
                maskCtx.strokeStyle = 'white';
                maskCtx.shadowColor = 'white';
                maskCtx.shadowBlur = canvas.width * 0.005;

                let maxBlur = 2;
                blurStrokes.forEach(stroke => {
                    if (stroke.blur > maxBlur) maxBlur = stroke.blur;
                    if (stroke.points && stroke.points.length > 0) {
                        const actualSize = (stroke.size / 100) * canvas.width;
                        maskCtx.lineWidth = actualSize;
                        
                        maskCtx.beginPath();
                        maskCtx.moveTo(stroke.points[0].x, stroke.points[0].y);
                        for (let i = 1; i < stroke.points.length; i++) {
                            maskCtx.lineTo(stroke.points[i].x, stroke.points[i].y);
                        }
                        maskCtx.stroke();
                        if(stroke.points.length === 1) {
                            maskCtx.beginPath();
                            maskCtx.arc(stroke.points[0].x, stroke.points[0].y, actualSize / 2, 0, Math.PI * 2);
                            maskCtx.fill();
                        }
                    }
                });

                const blurCanvas = document.createElement('canvas');
                blurCanvas.width = canvas.width;
                blurCanvas.height = canvas.height;
                const blurCtx = blurCanvas.getContext('2d');
                
                const blurRadius = (maxBlur / 100) * canvas.width;
                blurCtx.filter = `blur(${blurRadius}px)`;
                blurCtx.drawImage(canvas, 0, 0); 
                
                blurCtx.globalCompositeOperation = 'destination-in';
                blurCtx.drawImage(maskCanvas, 0, 0);

                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(blurCanvas, 0, 0);
            }
        };

        // Advanced Collage Layout Engine with 10+ Layouts
        const calculateCollageLayouts = (count, layoutType, s = 10) => {
            const w = 1080; const h = 1080; 
            let rects = [];
            
            if (layoutType === 'split-h') {
                const h1 = h / count;
                for(let i=0; i<count; i++) rects.push({x: 0, y: i*h1, w: w, h: h1});
            } else if (layoutType === 'split-v') {
                const w1 = w / count;
                for(let i=0; i<count; i++) rects.push({x: i*w1, y: 0, w: w1, h: h});
            } else if (layoutType === 'insta-1' && count >= 3) { // 1 Top, 2 Bottom
                rects.push({x: 0, y: 0, w: w, h: h/2});
                rects.push({x: 0, y: h/2, w: w/2, h: h/2});
                rects.push({x: w/2, y: h/2, w: w/2, h: h/2});
                for(let i=3; i<count; i++) rects.push({x:0, y:0, w:0, h:0}); 
            } else if (layoutType === 'insta-2' && count >= 3) { // 1 Left, 2 Right
                rects.push({x: 0, y: 0, w: w/2, h: h});
                rects.push({x: w/2, y: 0, w: w/2, h: h/2});
                rects.push({x: w/2, y: h/2, w: w/2, h: h/2});
                for(let i=3; i<count; i++) rects.push({x:0, y:0, w:0, h:0}); 
            } else if (layoutType === 'insta-3' && count >= 3) { // 2 Top, 1 Bottom
                rects.push({x: 0, y: 0, w: w/2, h: h/2});
                rects.push({x: w/2, y: 0, w: w/2, h: h/2});
                rects.push({x: 0, y: h/2, w: w, h: h/2});
                for(let i=3; i<count; i++) rects.push({x:0, y:0, w:0, h:0});
            } else if (layoutType === 'insta-6' && count >= 3) { // 2 Left, 1 Right
                rects.push({x: 0, y: 0, w: w/2, h: h/2});
                rects.push({x: 0, y: h/2, w: w/2, h: h/2});
                rects.push({x: w/2, y: 0, w: w/2, h: h});
                for(let i=3; i<count; i++) rects.push({x:0, y:0, w:0, h:0});
            } else if (layoutType === 'insta-4' && count >= 4) { // 1 Top, 3 Bottom
                rects.push({x: 0, y: 0, w: w, h: h*2/3});
                rects.push({x: 0, y: h*2/3, w: w/3, h: h/3});
                rects.push({x: w/3, y: h*2/3, w: w/3, h: h/3});
                rects.push({x: w*2/3, y: h*2/3, w: w/3, h: h/3});
                for(let i=4; i<count; i++) rects.push({x:0, y:0, w:0, h:0});
            } else if (layoutType === 'insta-5' && count >= 4) { // 1 Left, 3 Right
                rects.push({x: 0, y: 0, w: w*2/3, h: h});
                rects.push({x: w*2/3, y: 0, w: w/3, h: h/3});
                rects.push({x: w*2/3, y: h/3, w: w/3, h: h/3});
                rects.push({x: w*2/3, y: h*2/3, w: w/3, h: h/3});
                for(let i=4; i<count; i++) rects.push({x:0, y:0, w:0, h:0});
            } else if (layoutType === 'insta-7' && count >= 4) { // 3 Top, 1 Bottom
                rects.push({x: 0, y: 0, w: w/3, h: h/3});
                rects.push({x: w/3, y: 0, w: w/3, h: h/3});
                rects.push({x: w*2/3, y: 0, w: w/3, h: h/3});
                rects.push({x: 0, y: h/3, w: w, h: h*2/3});
                for(let i=4; i<count; i++) rects.push({x:0, y:0, w:0, h:0});
            } else if (layoutType === 'insta-8' && count >= 4) { // 3 Left, 1 Right
                rects.push({x: 0, y: 0, w: w/3, h: h/3});
                rects.push({x: 0, y: h/3, w: w/3, h: h/3});
                rects.push({x: 0, y: h*2/3, w: w/3, h: h/3});
                rects.push({x: w/3, y: 0, w: w*2/3, h: h});
                for(let i=4; i<count; i++) rects.push({x:0, y:0, w:0, h:0});
            } else if (layoutType === 'insta-9' && count >= 5) { // 2 Top, 3 Bottom
                rects.push({x: 0, y: 0, w: w/2, h: h/2});
                rects.push({x: w/2, y: 0, w: w/2, h: h/2});
                rects.push({x: 0, y: h/2, w: w/3, h: h/2});
                rects.push({x: w/3, y: h/2, w: w/3, h: h/2});
                rects.push({x: w*2/3, y: h/2, w: w/3, h: h/2});
                for(let i=5; i<count; i++) rects.push({x:0, y:0, w:0, h:0});
            } else if (layoutType === 'insta-10' && count >= 5) { // 3 Top, 2 Bottom
                rects.push({x: 0, y: 0, w: w/3, h: h/2});
                rects.push({x: w/3, y: 0, w: w/3, h: h/2});
                rects.push({x: w*2/3, y: 0, w: w/3, h: h/2});
                rects.push({x: 0, y: h/2, w: w/2, h: h/2});
                rects.push({x: w/2, y: h/2, w: w/2, h: h/2});
                for(let i=5; i<count; i++) rects.push({x:0, y:0, w:0, h:0});
            } else {
                // Default Auto Grid
                const cols = Math.ceil(Math.sqrt(count));
                const rows = Math.ceil(count / cols);
                const cw = w / cols;
                const ch = h / rows;
                for(let i=0; i<count; i++) {
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    rects.push({x: col*cw, y: row*ch, w: cw, h: ch});
                }
            }
            return rects.map(r => ({
                cx: r.x + s/2, cy: r.y + s/2, cw: r.w - s, ch: r.h - s
            }));
        };

        // Active Canvas Preview Component (Dual Canvas Architecture)
        const CanvasPreview = ({ 
            image, images, selectedCollageIds, globalSettings, updateImage, 
            isCollageMode, collageSettings, collageState, setCollageState 
        }) => {
            const canvasRef = useRef(null);
            const textCanvasRef = useRef(null);
            const cursorRef = useRef(null); // Ref for lag-free cursor
            
            const collageStateRef = useRef({});
            useEffect(() => {
                collageStateRef.current = { ...collageState };
            }, [collageState]);

            const [loadedImg, setLoadedImg] = useState(null);
            const [loadedCollageImgs, setLoadedCollageImgs] = useState({});

            const [isDrawing, setIsDrawing] = useState(false);
            const currentStrokeRef = useRef(null);
            
            const isDraggingRef = useRef(false);
            const dragInfoRef = useRef(null); 
            const dragOffsetRef = useRef({ dx: 0, dy: 0 });
            const dragPosRef = useRef(null); 
            
            const [zoom, setZoom] = useState(1);
            const scrollContainerRef = useRef(null);
            const [isPanning, setIsPanning] = useState(false);
            const panStartRef = useRef({ x: 0, y: 0, scrollLeft: 0, scrollTop: 0 });

            const [cursorPos, setCursorPos] = useState(null);
            const [displaySize, setDisplaySize] = useState(0);

            // Preload Single Image
            useEffect(() => {
                if(isCollageMode || !image?.originalUrl) return;
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => setLoadedImg(img); 
                img.src = image.originalUrl;
            }, [image?.originalUrl, isCollageMode]);

            // Preload Collage Images
            useEffect(() => {
                if(!isCollageMode) return;
                const baseImages = images.filter(i => !i.isCollage && selectedCollageIds.includes(i.id));
                let loadedCount = 0;
                let cache = {};
                baseImages.forEach(imgData => {
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.onload = () => {
                        cache[imgData.id] = img;
                        loadedCount++;
                        if(loadedCount === baseImages.length) setLoadedCollageImgs(cache);
                    };
                    img.src = imgData.originalUrl;
                });
            }, [isCollageMode, images, selectedCollageIds]);

            // Draw Base Layer
            const drawBaseLayer = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });

                if (isCollageMode) {
                    const baseImages = images.filter(i => !i.isCollage && selectedCollageIds.includes(i.id));
                    if (Object.keys(loadedCollageImgs).length !== baseImages.length) return; 

                    canvas.width = 1080;
                    canvas.height = 1080;
                    
                    ctx.fillStyle = collageSettings.borderColor;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    const layouts = calculateCollageLayouts(baseImages.length, collageSettings.layout, collageSettings.borderSize);

                    baseImages.forEach((imgData, i) => {
                        const img = loadedCollageImgs[imgData.id];
                        const rect = layouts[i];
                        if(!img || !rect || rect.cw <= 0) return;

                        const state = collageStateRef.current[imgData.id] || { dx: 0, dy: 0, scale: 1 };
                        const scale = state.scale || 1;

                        ctx.save();
                        ctx.filter = `brightness(${imgData.brightness}%) contrast(${imgData.contrast}%) saturate(${imgData.saturation}%)`;
                        
                        ctx.beginPath();
                        if (ctx.roundRect) ctx.roundRect(rect.cx, rect.cy, rect.cw, rect.ch, 24); 
                        else ctx.rect(rect.cx, rect.cy, rect.cw, rect.ch);
                        ctx.clip();

                        const imgRatio = img.naturalWidth / img.naturalHeight;
                        const cellRatio = rect.cw / rect.ch;
                        let drawWidth = rect.cw;
                        let drawHeight = rect.ch;
                        
                        if (collageSettings.imageFit === 'cover') {
                            if (imgRatio > cellRatio) {
                                drawWidth = rect.ch * imgRatio;
                            } else {
                                drawHeight = rect.cw / imgRatio;
                            }
                        } else {
                            if (imgRatio > cellRatio) {
                                drawHeight = rect.cw / imgRatio;
                            } else {
                                drawWidth = rect.ch * imgRatio;
                            }
                        }

                        drawWidth *= scale;
                        drawHeight *= scale;
                        const offsetX = (drawWidth - rect.cw) / 2;
                        const offsetY = (drawHeight - rect.ch) / 2;

                        ctx.drawImage(img, rect.cx - offsetX + state.dx, rect.cy - offsetY + state.dy, drawWidth, drawHeight);
                        ctx.restore();
                    });

                } else {
                    if (!loadedImg || !image) return;
                    canvas.width = loadedImg.naturalWidth;
                    canvas.height = loadedImg.naturalHeight;

                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.filter = `brightness(${image.brightness}%) contrast(${image.contrast}%) saturate(${image.saturation}%)`;
                    ctx.drawImage(loadedImg, 0, 0, canvas.width, canvas.height);
                    ctx.filter = 'none';

                    applyEraserStrokes(ctx, canvas, image.eraserStrokes);
                }
            }, [isCollageMode, image, loadedImg, images, selectedCollageIds, loadedCollageImgs, collageSettings]);

            // Draw Text Layer
            const drawTextLayer = useCallback(() => {
                const canvas = textCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');

                if (isCollageMode) {
                    const baseImages = images.filter(i => !i.isCollage && selectedCollageIds.includes(i.id));
                    canvas.width = 1080;
                    canvas.height = 1080;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    if (collageSettings.showNames) {
                        const layouts = calculateCollageLayouts(baseImages.length, collageSettings.layout, collageSettings.borderSize);
                        const fontSize = collageSettings.textSize || 40;
                        ctx.font = `bold ${fontSize}px ${collageSettings.textFont || 'Arial'}`;
                        
                        // Text Shadow
                        ctx.shadowColor = "rgba(0,0,0,0.8)";
                        ctx.shadowBlur = 10;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;

                        baseImages.forEach((imgData, i) => {
                            if(!imgData.nameText) return;
                            const rect = layouts[i];
                            if(!rect || rect.cw <= 0) return;

                            const state = collageStateRef.current[imgData.id] || {};
                            const pos = collageSettings.hoverTextPosition || collageSettings.textPosition || 'bottom-center';
                            
                            let tx = rect.cx + rect.cw / 2;
                            let ty = rect.cy + rect.ch / 2;
                            ctx.textAlign = 'center';

                            if (pos.includes('top')) ty = rect.cy + fontSize + 15;
                            else if (pos.includes('bottom')) ty = rect.cy + rect.ch - fontSize - 15;

                            if (pos.includes('left')) { tx = rect.cx + 20; ctx.textAlign = 'left'; }
                            else if (pos.includes('right')) { tx = rect.cx + rect.cw - 20; ctx.textAlign = 'right'; }

                            // If not currently hovering a preview, use user dragged pos
                            if (!collageSettings.hoverTextPosition) {
                                if (state.textX !== undefined && state.textX !== null) tx = state.textX;
                                if (state.textY !== undefined && state.textY !== null) ty = state.textY;
                            }

                            ctx.fillStyle = collageSettings.textColor || '#000000';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(imgData.nameText, tx, ty);
                        });
                    }
                } else {
                    if (!loadedImg || !image) return;
                    canvas.width = loadedImg.naturalWidth;
                    canvas.height = loadedImg.naturalHeight;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    if (globalSettings.showWatermark && image.nameText) {
                        ctx.save();
                        const fontSize = (globalSettings.fontSize / 100) * canvas.height;
                        ctx.font = `bold ${fontSize}px ${globalSettings.fontFamily}`;
                        ctx.fillStyle = globalSettings.color;
                        ctx.globalAlpha = globalSettings.opacity / 100;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = "rgba(0,0,0,0.8)";
                        ctx.shadowBlur = 12;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;

                        let x = canvas.width / 2;
                        let y = canvas.height / 2;

                        if (globalSettings.hoverPosition) {
                            const pos = globalSettings.hoverPosition;
                            if (pos.includes('top')) y = fontSize + 20;
                            else if (pos.includes('bottom')) y = canvas.height - fontSize - 20;
                            if (pos.includes('left')) { x = 20; ctx.textAlign = 'left'; }
                            else if (pos.includes('right')) { x = canvas.width - 20; ctx.textAlign = 'right'; }
                        } else if (dragPosRef.current) {
                            x = dragPosRef.current.x;
                            y = dragPosRef.current.y;
                        } else if (image.customWatermarkPos) {
                            x = image.customWatermarkPos.x;
                            y = image.customWatermarkPos.y;
                        } else {
                            const pos = globalSettings.position;
                            if (pos.includes('top')) y = fontSize + 20;
                            else if (pos.includes('bottom')) y = canvas.height - fontSize - 20;
                            if (pos.includes('left')) { x = 20; ctx.textAlign = 'left'; }
                            else if (pos.includes('right')) { x = canvas.width - 20; ctx.textAlign = 'right'; }
                        }

                        ctx.fillText(image.nameText, x, y);
                        ctx.restore();
                    }
                }
            }, [isCollageMode, image, globalSettings, loadedImg, images, selectedCollageIds, collageSettings]);

            useEffect(() => { drawBaseLayer(); }, [drawBaseLayer]);
            useEffect(() => { drawTextLayer(); }, [drawTextLayer]);

            const handleZoomIn = () => setZoom(z => Math.min(z + 0.5, 10));
            const handleZoomOut = () => setZoom(z => Math.max(z - 0.5, 1));
            
            const handleFitToWindow = () => {
                setZoom(1);
                if (scrollContainerRef.current) {
                    scrollContainerRef.current.scrollLeft = 0;
                    scrollContainerRef.current.scrollTop = 0;
                }
            };

            useEffect(() => { handleFitToWindow(); }, [image?.id]);
            useEffect(() => { if (!globalSettings.isEraserMode) handleFitToWindow(); }, [globalSettings.isEraserMode]);

            // Wheel Zoom Logic for Grid & Canvas
            useEffect(() => {
                const container = scrollContainerRef.current;
                if (!container) return;
                
                const handleNativeWheel = (e) => {
                    if (isCollageMode) {
                        const coords = getCoordinates(e);
                        const target = checkHoverTarget(coords);
                        if (target.type === 'cell') {
                            e.preventDefault();
                            const zoomStep = e.deltaY < 0 ? 0.05 : -0.05;
                            if (!collageStateRef.current[target.id]) collageStateRef.current[target.id] = { dx: 0, dy: 0, textX: null, textY: null, scale: 1 };
                            const st = collageStateRef.current[target.id];
                            // Allow zoom out down to 0.1
                            st.scale = Math.max(0.1, Math.min((st.scale || 1) + zoomStep, 5));
                            drawBaseLayer(); 
                        }
                        return;
                    }

                    if (!globalSettings.isEraserMode) return; 
                    if (e.ctrlKey) {
                        e.preventDefault(); 
                        const zoomStep = e.deltaY < 0 ? 0.25 : -0.25;
                        const newZoom = Math.min(Math.max(1, zoom + zoomStep), 10); 
                        if (newZoom !== zoom) {
                            const rect = container.getBoundingClientRect();
                            const mouseX = e.clientX - rect.left;
                            const mouseY = e.clientY - rect.top;
                            const contentX = mouseX + container.scrollLeft;
                            const contentY = mouseY + container.scrollTop;
                            const scaleRatio = newZoom / zoom;
                            const newScrollLeft = contentX * scaleRatio - mouseX;
                            const newScrollTop = contentY * scaleRatio - mouseY;
                            setZoom(newZoom);
                            setTimeout(() => {
                                if (scrollContainerRef.current) {
                                    scrollContainerRef.current.scrollLeft = newScrollLeft;
                                    scrollContainerRef.current.scrollTop = newScrollTop;
                                }
                            }, 0);
                        }
                    }
                };

                container.addEventListener('wheel', handleNativeWheel, { passive: false });
                return () => container.removeEventListener('wheel', handleNativeWheel);
            }, [zoom, globalSettings.isEraserMode, isCollageMode, drawBaseLayer]);

            const handleDoubleClick = (e) => {
                const container = scrollContainerRef.current;
                if (!container || (!globalSettings.isEraserMode && !isCollageMode)) return; 

                if (zoom === 1) {
                    const newZoom = 3;
                    const rect = container.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;

                    const contentX = mouseX + container.scrollLeft;
                    const contentY = mouseY + container.scrollTop;

                    const scaleRatio = newZoom / zoom;
                    const newScrollLeft = contentX * scaleRatio - mouseX;
                    const newScrollTop = contentY * scaleRatio - mouseY;

                    setZoom(newZoom);
                    setTimeout(() => {
                        if (scrollContainerRef.current) {
                            scrollContainerRef.current.scrollLeft = newScrollLeft;
                            scrollContainerRef.current.scrollTop = newScrollTop;
                        }
                    }, 0);
                } else {
                    handleFitToWindow();
                }
            };

            const handleContainerMouseDown = (e) => {
                if ((globalSettings.isEraserMode || isCollageMode) || zoom <= 1) return;
                setIsPanning(true);
                const container = scrollContainerRef.current;
                panStartRef.current = {
                    x: e.clientX,
                    y: e.clientY,
                    scrollLeft: container.scrollLeft,
                    scrollTop: container.scrollTop
                };
            };

            const handleContainerMouseMove = (e) => {
                if (!isPanning || globalSettings.isEraserMode || isCollageMode) return;
                const container = scrollContainerRef.current;
                const dx = e.clientX - panStartRef.current.x;
                const dy = e.clientY - panStartRef.current.y;
                container.scrollLeft = panStartRef.current.scrollLeft - dx;
                container.scrollTop = panStartRef.current.scrollTop - dy;
            };

            const handleContainerMouseUp = () => { setIsPanning(false); };

            const getCoordinates = useCallback((e) => {
                const canvas = textCanvasRef.current;
                if(!canvas) return {x:0, y:0};
                const rect = canvas.getBoundingClientRect();
                let renderedWidth = rect.width;
                let renderedHeight = rect.height;
                let offsetX = 0; let offsetY = 0;

                const canvasAspect = canvas.width / canvas.height;
                const rectAspect = rect.width / rect.height;

                if (canvasAspect > rectAspect) {
                    renderedHeight = rect.width / canvasAspect;
                    offsetY = (rect.height - renderedHeight) / 2;
                } else if (canvasAspect < rectAspect) {
                    renderedWidth = rect.height * canvasAspect;
                    offsetX = (rect.width - renderedWidth) / 2;
                }

                const scaleX = canvas.width / renderedWidth;
                const scaleY = canvas.height / renderedHeight;
                const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;

                return {
                    x: (clientX - rect.left - offsetX) * scaleX,
                    y: (clientY - rect.top - offsetY) * scaleY
                };
            }, []);

            const checkHoverTarget = useCallback((coords) => {
                const canvas = textCanvasRef.current;
                if (!canvas) return { type: null, id: null };
                const ctx = canvas.getContext('2d');

                if (isCollageMode) {
                    const baseImages = images.filter(i => !i.isCollage && selectedCollageIds.includes(i.id));
                    const layouts = calculateCollageLayouts(baseImages.length, collageSettings.layout, collageSettings.borderSize);
                    
                    if (collageSettings.showNames) {
                        const fontSize = collageSettings.textSize || 40;
                        ctx.font = `bold ${fontSize}px ${collageSettings.textFont || 'Arial'}`;
                        
                        for(let i=0; i<baseImages.length; i++) {
                            const imgData = baseImages[i];
                            if(!imgData.nameText) continue;
                            const rect = layouts[i];
                            const state = collageStateRef.current[imgData.id] || {};
                            
                            let tx = rect.cx + rect.cw / 2;
                            let ty = rect.cy + rect.ch / 2;
                            const pos = collageSettings.textPosition || 'bottom-center';

                            if (pos.includes('top')) ty = rect.cy + fontSize + 15;
                            else if (pos.includes('bottom')) ty = rect.cy + rect.ch - fontSize - 15;
                            if (pos.includes('left')) tx = rect.cx + 20;
                            else if (pos.includes('right')) tx = rect.cx + rect.cw - 20;

                            if (state.textX !== undefined && state.textX !== null) tx = state.textX;
                            if (state.textY !== undefined && state.textY !== null) ty = state.textY;

                            const metrics = ctx.measureText(imgData.nameText);
                            const tw = metrics.width;
                            const th = fontSize;
                            const padding = 30;

                            if (coords.x >= tx - tw/2 - padding && coords.x <= tx + tw/2 + padding &&
                                coords.y >= ty - th/2 - padding && coords.y <= ty + th/2 + padding) {
                                return { type: 'text', id: imgData.id, startX: tx, startY: ty };
                            }
                        }
                    }
                    
                    for(let i=0; i<baseImages.length; i++) {
                        const rect = layouts[i];
                        if (coords.x >= rect.cx && coords.x <= rect.cx + rect.cw &&
                            coords.y >= rect.cy && coords.y <= rect.cy + rect.ch) {
                            return { type: 'cell', id: baseImages[i].id };
                        }
                    }
                } else {
                    if (globalSettings.showWatermark && image?.nameText) {
                        const fontSize = (globalSettings.fontSize / 100) * canvas.height;
                        ctx.font = `bold ${fontSize}px ${globalSettings.fontFamily}`;
                        const metrics = ctx.measureText(image.nameText);
                        const textWidth = metrics.width;
                        const textHeight = fontSize;

                        let x = canvas.width / 2;
                        let y = canvas.height / 2;
                        let align = 'center';

                        if (dragPosRef.current) {
                            x = dragPosRef.current.x;
                            y = dragPosRef.current.y;
                        } else if (image.customWatermarkPos) {
                            x = image.customWatermarkPos.x;
                            y = image.customWatermarkPos.y;
                        } else {
                            const pos = globalSettings.hoverPosition || globalSettings.position;
                            if (pos.includes('top')) y = fontSize + 20;
                            else if (pos.includes('bottom')) y = canvas.height - fontSize - 20;
                            if (pos.includes('left')) { x = 20; ctx.textAlign = 'left'; }
                            else if (pos.includes('right')) { x = canvas.width - 20; ctx.textAlign = 'right'; }
                        }

                        let boxLeft = x;
                        if (align === 'center') boxLeft = x - textWidth / 2;
                        else if (align === 'right') boxLeft = x - textWidth;

                        let boxTop = y - textHeight / 2;
                        let boxRight = boxLeft + textWidth;
                        let boxBottom = boxTop + textHeight;

                        const padding = 40; 
                        if (coords.x >= boxLeft - padding && coords.x <= boxRight + padding &&
                            coords.y >= boxTop - padding && coords.y <= boxBottom + padding) {
                            return { type: 'text', id: image.id, startX: x, startY: y };
                        }
                    }
                }
                return { type: null, id: null };
            }, [isCollageMode, images, selectedCollageIds, collageSettings, globalSettings, image]);

            const updateCursor = (e) => {
                if (isCollageMode || !globalSettings.isEraserMode) {
                    if (cursorRef.current) cursorRef.current.style.display = 'none';
                    return;
                }
                const canvas = textCanvasRef.current;
                if (canvas && cursorRef.current) {
                    const rect = canvas.getBoundingClientRect();
                    const canvasAspect = canvas.width / canvas.height;
                    const rectAspect = rect.width / rect.height;
                    let renderedWidth = rect.width;
                    if (canvasAspect < rectAspect) renderedWidth = rect.height * canvasAspect;
                    const sizeOnScreen = (globalSettings.eraserSize / 100) * renderedWidth;

                    const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
                    
                    cursorRef.current.style.width = `${sizeOnScreen}px`;
                    cursorRef.current.style.height = `${sizeOnScreen}px`;
                    cursorRef.current.style.left = `${clientX - sizeOnScreen / 2}px`;
                    cursorRef.current.style.top = `${clientY - sizeOnScreen / 2}px`;
                    cursorRef.current.style.display = 'block';
                }
            };

            const startDrawingOrDragging = (e) => {
                const coords = getCoordinates(e);
                
                if (isCollageMode) {
                    e.stopPropagation();
                    const target = checkHoverTarget(coords);
                    if (target.type) {
                        isDraggingRef.current = true;
                        dragInfoRef.current = target;
                        if (!collageStateRef.current[target.id]) collageStateRef.current[target.id] = { dx: 0, dy: 0, textX: null, textY: null, scale: 1 };
                        
                        if (target.type === 'text') {
                            dragOffsetRef.current = { dx: coords.x - target.startX, dy: coords.y - target.startY };
                        } else {
                            const state = collageStateRef.current[target.id];
                            dragOffsetRef.current = { dx: coords.x - state.dx, dy: coords.y - state.dy };
                        }
                    }
                    return;
                }

                // Single Image Mode
                if (globalSettings.isEraserMode) {
                    e.stopPropagation();
                    updateCursor(e);
                    setIsDrawing(true);
                    
                    const canvas = canvasRef.current; 
                    const ctx = canvas.getContext('2d', { willReadFrequently: true });
                    
                    let pickedColor = '#ffffff'; 
                    if (globalSettings.eraserType === 'auto') {
                        try {
                            const pixel = ctx.getImageData(coords.x, coords.y, 1, 1).data;
                            pickedColor = `rgba(${pixel[0]}, ${pixel[1]}, ${pixel[2]}, ${pixel[3] / 255})`;
                        } catch(err) {}
                    } else if (globalSettings.eraserType === 'color') {
                        pickedColor = globalSettings.eraserColor;
                    }

                    currentStrokeRef.current = { 
                        type: globalSettings.eraserType,
                        size: globalSettings.eraserSize, 
                        color: pickedColor, 
                        blur: globalSettings.eraserBlur,
                        points: [coords] 
                    };
                    
                    ctx.save();
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = pickedColor; 
                    const actualSize = (currentStrokeRef.current.size / 100) * canvas.width;
                    ctx.beginPath();
                    ctx.arc(coords.x, coords.y, actualSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                } else {
                    const target = checkHoverTarget(coords);
                    if (target.type === 'text') {
                        e.stopPropagation();
                        isDraggingRef.current = true;
                        dragInfoRef.current = target;
                        dragOffsetRef.current = { dx: coords.x - target.startX, dy: coords.y - target.startY };
                        dragPosRef.current = { x: target.startX, y: target.startY };
                    }
                }
            };

            const doDrawOrDrag = (e) => {
                const coords = getCoordinates(e);
                
                if (isCollageMode) {
                    if (isDraggingRef.current && dragInfoRef.current) {
                        e.stopPropagation();
                        const { type, id } = dragInfoRef.current;
                        
                        if (type === 'text') {
                            collageStateRef.current[id].textX = coords.x - dragOffsetRef.current.dx;
                            collageStateRef.current[id].textY = coords.y - dragOffsetRef.current.dy;
                            drawTextLayer(); 
                        } else if (type === 'cell') {
                            collageStateRef.current[id].dx = coords.x - dragOffsetRef.current.dx;
                            collageStateRef.current[id].dy = coords.y - dragOffsetRef.current.dy;
                            drawBaseLayer(); 
                        }
                    } else {
                        const target = checkHoverTarget(coords);
                        if (textCanvasRef.current) {
                            textCanvasRef.current.style.cursor = target.type === 'text' ? 'move' : (target.type === 'cell' ? 'grab' : 'default');
                        }
                    }
                    return;
                }

                if (globalSettings.isEraserMode) {
                    e.stopPropagation();
                    updateCursor(e);
                    if (!isDrawing || !currentStrokeRef.current) return;
                    currentStrokeRef.current.points.push(coords);
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d', { willReadFrequently: true });
                    ctx.save();
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = currentStrokeRef.current.color; 
                    const actualSize = (currentStrokeRef.current.size / 100) * canvas.width;
                    ctx.lineWidth = actualSize;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    const pts = currentStrokeRef.current.points;
                    ctx.beginPath();
                    if (pts.length > 1) {
                        ctx.moveTo(pts[pts.length - 2].x, pts[pts.length - 2].y);
                        ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
                        ctx.stroke();
                    }
                    ctx.restore();
                } else if (isDraggingRef.current && dragInfoRef.current?.type === 'text') {
                    e.stopPropagation();
                    dragPosRef.current = {
                        x: coords.x - dragOffsetRef.current.dx,
                        y: coords.y - dragOffsetRef.current.dy
                    };
                    drawTextLayer(); 
                } else {
                    const target = checkHoverTarget(coords);
                    if (textCanvasRef.current) {
                        textCanvasRef.current.style.cursor = target.type === 'text' ? 'move' : (zoom > 1 ? 'grab' : 'default');
                    }
                }
            };

            const endDrawingOrDragging = (e) => {
                if (isCollageMode) {
                    if (isDraggingRef.current) {
                        e.stopPropagation();
                        isDraggingRef.current = false;
                        dragInfoRef.current = null;
                        setCollageState({ ...collageStateRef.current });
                    }
                    return;
                }

                if (globalSettings.isEraserMode) {
                    e.stopPropagation();
                    if (!isDrawing) return;
                    setIsDrawing(false);
                    if (currentStrokeRef.current && currentStrokeRef.current.points.length > 0) {
                        const newStrokes = [...(image.eraserStrokes || []), currentStrokeRef.current];
                        updateImage(image.id, 'eraserStrokes', newStrokes);
                        updateImage(image.id, 'redoStrokes', []); 
                    }
                    currentStrokeRef.current = null;
                } else if (isDraggingRef.current) {
                    e.stopPropagation();
                    isDraggingRef.current = false;
                    dragInfoRef.current = null;
                    if (dragPosRef.current) {
                        updateImage(image.id, 'customWatermarkPos', dragPosRef.current);
                    }
                    dragPosRef.current = null;
                }
            };

            const handleMouseLeave = (e) => {
                if (cursorRef.current) cursorRef.current.style.display = 'none';
                if (globalSettings.isEraserMode && isDrawing) {
                    endDrawingOrDragging(e);
                } else if (isDraggingRef.current) {
                    endDrawingOrDragging(e);
                }
            };

            const cursorColor = globalSettings.eraserType === 'auto' 
                ? `rgba(0, 120, 255, 0.4)` 
                : (globalSettings.eraserType === 'color' ? `${globalSettings.eraserColor}80` : `rgba(255, 255, 255, 0.7)`);

            return (
                <div className="w-full h-full relative overflow-hidden bg-slate-50 rounded-xl group flex items-center justify-center border border-slate-200">
                    
                    {(!isCollageMode && globalSettings.isEraserMode) && (
                        <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex items-center gap-3 bg-white/90 backdrop-blur-md px-4 py-2 rounded-full shadow-[0_5px_15px_rgba(0,0,0,0.1)] border border-slate-200 z-30 transition-all opacity-80 hover:opacity-100">
                            <button onClick={handleZoomOut} disabled={zoom <= 1} className="p-1 text-slate-600 hover:text-blue-600 disabled:opacity-30 transition-colors" title="Zoom Out (-)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                            </button>
                            <span className="text-xs font-bold text-slate-700 min-w-[40px] text-center">{Math.round(zoom * 100)}%</span>
                            <button onClick={handleZoomIn} disabled={zoom >= 10} className="p-1 text-slate-600 hover:text-blue-600 disabled:opacity-30 transition-colors" title="Zoom In (+)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                            </button>
                            <div className="w-px h-4 bg-slate-300 mx-1"></div>
                            <button onClick={handleFitToWindow} className="text-[10px] font-bold text-blue-600 hover:text-blue-800 transition-colors uppercase tracking-wider flex items-center gap-1">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14v6h6M20 10V4h-6M10 20H4v-6M14 4h6v6"/></svg>
                                Fit Screen
                            </button>
                        </div>
                    )}

                    <div 
                        ref={scrollContainerRef}
                        className={`absolute inset-0 overflow-auto custom-scrollbar ${(!isCollageMode && !globalSettings.isEraserMode) && zoom > 1 ? (isPanning ? 'cursor-grabbing' : 'cursor-grab') : ''}`}
                        onDoubleClick={handleDoubleClick}
                        onMouseDown={handleContainerMouseDown}
                        onMouseMove={handleContainerMouseMove}
                        onMouseUp={handleContainerMouseUp}
                        onMouseLeave={handleContainerMouseUp}
                    >
                        <div style={{ width: `${zoom * 100}%`, height: `${zoom * 100}%`, minWidth: '100%', minHeight: '100%', position: 'relative' }}>
                            {/* Base Image Layer */}
                            <canvas 
                                ref={canvasRef} 
                                className="absolute top-0 left-0 w-full h-full object-contain drop-shadow-2xl rounded-lg checkerboard-bg"
                                style={{ transform: 'scale(0.95)', transformOrigin: 'center center' }}
                            ></canvas>
                            
                            {/* Top Text Layer & Event Listener */}
                            <canvas 
                                ref={textCanvasRef} 
                                onMouseDown={startDrawingOrDragging}
                                onMouseMove={doDrawOrDrag}
                                onMouseUp={endDrawingOrDragging}
                                onMouseLeave={handleMouseLeave}
                                onTouchStart={startDrawingOrDragging}
                                onTouchMove={doDrawOrDrag}
                                onTouchEnd={endDrawingOrDragging}
                                className={`absolute top-0 left-0 w-full h-full object-contain rounded-lg ${(!isCollageMode && globalSettings.isEraserMode) ? 'cursor-crosshair touch-none' : 'touch-none'}`}
                                style={{ transform: 'scale(0.95)', transformOrigin: 'center center' }}
                            ></canvas>
                        </div>
                    </div>
                    
                    {/* Live Cursor Preview (Using Direct DOM for 60fps No-Lag) */}
                    <div 
                        ref={cursorRef}
                        style={{
                            position: 'fixed',
                            display: 'none',
                            borderRadius: '50%',
                            border: '1.5px solid rgba(0, 0, 0, 0.7)',
                            boxShadow: '0 0 0 1px rgba(255, 255, 255, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.8)',
                            pointerEvents: 'none',
                            zIndex: 9999,
                            backgroundColor: cursorColor
                        }}
                    />
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [images, setImages] = useState([]);
            const [activeImageId, setActiveImageId] = useState(null);
            const [isRestoring, setIsRestoring] = useState(true); 
            
            const defaultGlobalSettings = {
                showWatermark: true,
                fontSize: 10,
                color: '#000000', 
                fontFamily: 'Arial',
                position: 'top-left', 
                opacity: 100,
                hoverPosition: null,
                isEraserMode: false,
                eraserType: 'auto', 
                eraserSize: 5,
                eraserColor: '#ffffff',
                eraserBlur: 2
            };
            const [globalSettings, setGlobalSettings] = useState(defaultGlobalSettings);
            
            const [isCollageMode, setIsCollageMode] = useState(false);
            const [selectedCollageIds, setSelectedCollageIds] = useState([]); 

            const [collageSettings, setCollageSettings] = useState({
                layout: 'grid', 
                showNames: true,
                borderColor: '#ffffff', 
                borderSize: 4,          
                imageFit: 'contain',    
                textFont: 'Arial',
                textPosition: 'bottom-center',
                hoverTextPosition: null, 
                textSize: 40,
                textColor: '#000000' 
            });
            const [collageState, setCollageState] = useState({}); 

            const [isDownloading, setIsDownloading] = useState(false);
            const [isCreatingCollage, setIsCreatingCollage] = useState(false);
            
            const [isPosDropdownOpen, setIsPosDropdownOpen] = useState(false);
            const [isFontDropdownOpen, setIsFontDropdownOpen] = useState(false);
            const [isCollagePosDropdownOpen, setIsCollagePosDropdownOpen] = useState(false);
            const [isCollageFontDropdownOpen, setIsCollageFontDropdownOpen] = useState(false);
            
            const [compression, setCompression] = useState({ enabled: false, targetMB: '' });
            const [toast, setToast] = useState(null);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            // ---- DB ENGINE ----
            useEffect(() => {
                const loadData = async () => {
                    try {
                        const savedGlobal = await localforage.getItem('pe_globalSettings');
                        const savedCollage = await localforage.getItem('pe_collageSettings');
                        const savedImages = await localforage.getItem('pe_images');
                        const savedSelectedIds = await localforage.getItem('pe_selectedCollageIds');

                        if (savedGlobal) setGlobalSettings({...savedGlobal, isEraserMode: false}); 
                        if (savedCollage) setCollageSettings(savedCollage);
                        if (savedSelectedIds) setSelectedCollageIds(savedSelectedIds);

                        if (savedImages && savedImages.length > 0) {
                            const restoredImages = savedImages.map(img => ({
                                ...img,
                                originalUrl: URL.createObjectURL(img.file)
                            }));
                            setImages(restoredImages);
                            setActiveImageId(restoredImages[0].id);
                        }
                    } catch (err) {
                        console.error("Data restore error:", err);
                    } finally {
                        setIsRestoring(false);
                    }
                };
                loadData();
            }, []);

            useEffect(() => {
                if (!isRestoring) {
                    localforage.setItem('pe_globalSettings', globalSettings);
                    localforage.setItem('pe_collageSettings', collageSettings);
                    localforage.setItem('pe_selectedCollageIds', selectedCollageIds);
                    const imagesToSave = images.map(img => {
                        const { originalUrl, ...rest } = img;
                        return rest;
                    });
                    localforage.setItem('pe_images', imagesToSave);
                }
            }, [images, globalSettings, collageSettings, selectedCollageIds, isRestoring]);

            const totalOriginalSizeMB = images.reduce((acc, img) => acc + img.file.size, 0) / (1024 * 1024);

            const positionOptions = [
                { value: 'top-left', label: 'Top Left' },
                { value: 'top-center', label: 'Top Center' },
                { value: 'top-right', label: 'Top Right' },
                { value: 'center-left', label: 'Center Left' },
                { value: 'center', label: 'Center' },
                { value: 'center-right', label: 'Center Right' },
                { value: 'bottom-left', label: 'Bottom Left' },
                { value: 'bottom-center', label: 'Bottom Center' },
                { value: 'bottom-right', label: 'Bottom Right' }
            ];
            const fontOptions = ['Arial', 'Verdana', 'Courier New', 'Georgia', 'Impact', 'Times New Roman'];

            const handleUpload = (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const newImages = files.map((file, index) => {
                    const fileName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                    const fileExt = file.name.split('.').pop();
                    
                    return {
                        id: Date.now() + index,
                        isCollage: false,
                        file: file, 
                        originalUrl: URL.createObjectURL(file),
                        nameText: fileName,
                        fileType: file.type || 'image/jpeg',
                        fileExt: fileExt || 'jpg',
                        brightness: 100,
                        contrast: 100,
                        saturation: 100,
                        eraserStrokes: [],
                        redoStrokes: [],
                        customWatermarkPos: null
                    };
                }); setImages(prev => {
                    const updatedList = [...prev, ...newImages];
                    if (!activeImageId && updatedList.length > 0 && !isCollageMode) {
                        setActiveImageId(updatedList[0].id);
                    }
                    return updatedList;
                });

                setSelectedCollageIds(prev => [...prev, ...newImages.map(img => img.id)]);
            };

            const updateImage = (id, field, value) => {
                setImages(prev => prev.map(img => img.id === id ? { ...img, [field]: value } : img));
            };

            const updateCollageSetting = (field, value) => {
                setCollageSettings(prev => ({ ...prev, [field]: value }));
            };

            const resetActivePhotoFilters = () => {
                if (activeImageId) {
                    setImages(prev => prev.map(img => img.id === activeImageId ? {
                        ...img, brightness: 100, contrast: 100, saturation: 100
                    } : img));
                }
            };

            const applyFiltersToAll = () => {
                if (!activeImageId) return;
                const activeImg = images.find(img => img.id === activeImageId);
                if(activeImg) {
                    setImages(prev => prev.map(img => ({
                        ...img, brightness: activeImg.brightness, contrast: activeImg.contrast, saturation: activeImg.saturation
                    })));
                }
            };

            const deleteImage = (e, id) => {
                e.stopPropagation();
                setImages(prev => {
                    const newImages = prev.filter(img => img.id !== id);
                    if (activeImageId === id) setActiveImageId(newImages.length > 0 ? newImages[0].id : null);
                    return newImages;
                });
                setCollageState(prev => {
                    const next = {...prev};
                    delete next[id];
                    return next;
                });
                setSelectedCollageIds(prev => prev.filter(sid => sid !== id));
            };

            const clearAllImages = async () => {
                if (window.confirm("Are you sure you want to clear all images and reset settings?")) {
                    setImages([]);
                    setActiveImageId(null);
                    setIsCollageMode(false);
                    setCollageState({});
                    setSelectedCollageIds([]);
                    setGlobalSettings(defaultGlobalSettings);
                    await localforage.clear(); 
                    showToast("Workspace Reset Successful!", "success");
                }
            };

            const handleUndo = () => {
                if (!activeImageId || isCollageMode) return;
                const activeImg = images.find(img => img.id === activeImageId);
                if (!activeImg || !activeImg.eraserStrokes || activeImg.eraserStrokes.length === 0) return;
                
                const strokes = [...activeImg.eraserStrokes];
                const lastStroke = strokes.pop();
                const redoStrokes = [...(activeImg.redoStrokes || []), lastStroke];
                
                updateImage(activeImageId, 'eraserStrokes', strokes);
                updateImage(activeImageId, 'redoStrokes', redoStrokes);
            };

            const handleRedo = () => {
                if (!activeImageId || isCollageMode) return;
                const activeImg = images.find(img => img.id === activeImageId);
                if (!activeImg || !activeImg.redoStrokes || activeImg.redoStrokes.length === 0) return;
                
                const redoStrokes = [...activeImg.redoStrokes];
                const strokeToRedo = redoStrokes.pop();
                const strokes = [...(activeImg.eraserStrokes || []), strokeToRedo];
                
                updateImage(activeImageId, 'eraserStrokes', strokes);
                updateImage(activeImageId, 'redoStrokes', redoStrokes);
            };

            const clearAllStrokes = () => {
                if(activeImageId && !isCollageMode) {
                    updateImage(activeImageId, 'eraserStrokes', []);
                    updateImage(activeImageId, 'redoStrokes', []);
                }
            };

            const startCollageEditor = () => {
                const baseImages = images.filter(img => !img.isCollage && selectedCollageIds.includes(img.id));
                if (baseImages.length < 2) {
                    showToast("Select at least 2 photos to make a grid.", "error");
                    return;
                }
                
                const initialState = {};
                baseImages.forEach(img => {
                    initialState[img.id] = { dx: 0, dy: 0, textX: null, textY: null, scale: 1 };
                });
                setCollageState(initialState);
                
                setGlobalSettings(prev => ({...prev, isEraserMode: false})); 
                setIsCollageMode(true);
                showToast("Collage Editor Activated!", "success");
            };

            const saveCollage = async () => {
                const baseImages = images.filter(img => !img.isCollage && selectedCollageIds.includes(img.id));
                if (baseImages.length < 2) return;
                
                setIsCreatingCollage(true);
                showToast("Saving Final Collage...", "success");

                try {
                    const canvas = document.createElement('canvas');
                    
                    let exportCellSize = 1080;
                    if (baseImages.length > 9) exportCellSize = 720;
                    if (baseImages.length > 16) exportCellSize = 540;

                    let cols = Math.ceil(Math.sqrt(baseImages.length));
                    if (collageSettings.layout === 'split-h') cols = 1;
                    if (collageSettings.layout === 'split-v') cols = baseImages.length;
                    
                    const rows = Math.ceil(baseImages.length / cols);
                    const S = collageSettings.borderSize;
                    
                    canvas.width = cols * exportCellSize + (cols + 1) * S;
                    canvas.height = rows * exportCellSize + (rows + 1) * S;

                    const ctx = canvas.getContext('2d');
                    
                    ctx.fillStyle = collageSettings.borderColor; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    const finalLayoutType = baseImages.length > 4 ? 'grid' : collageSettings.layout;
                    const layouts = calculateCollageLayouts(baseImages.length, finalLayoutType, S);

                    for (let i = 0; i < baseImages.length; i++) {
                        const imgData = baseImages[i];
                        const rect = layouts[i];
                        if(!rect) continue;

                        await new Promise((resolve, reject) => {
                            const img = new Image();
                            img.crossOrigin = "anonymous";
                            img.onload = () => {
                                ctx.save();
                                ctx.filter = `brightness(${imgData.brightness}%) contrast(${imgData.contrast}%) saturate(${imgData.saturation}%)`;
                                
                                const scaleX = canvas.width / 1080;
                                const scaleY = canvas.height / 1080;

                                const exportRect = {
                                    cx: rect.cx * scaleX,
                                    cy: rect.cy * scaleY,
                                    cw: rect.cw * scaleX,
                                    ch: rect.ch * scaleY
                                };

                                ctx.beginPath();
                                if (ctx.roundRect) ctx.roundRect(exportRect.cx, exportRect.cy, exportRect.cw, exportRect.ch, 24); 
                                else ctx.rect(exportRect.cx, exportRect.cy, exportRect.cw, exportRect.ch);
                                ctx.clip();

                                const imgRatio = img.naturalWidth / img.naturalHeight;
                                const cellRatio = exportRect.cw / exportRect.ch;
                                let drawWidth = exportRect.cw;
                                let drawHeight = exportRect.ch;
                                
                                if (collageSettings.imageFit === 'cover') {
                                    if (imgRatio > cellRatio) drawWidth = exportRect.ch * imgRatio;
                                    else drawHeight = exportRect.cw / imgRatio;
                                } else {
                                    if (imgRatio > cellRatio) drawHeight = exportRect.cw / imgRatio;
                                    else drawWidth = exportRect.ch * imgRatio;
                                }

                                const state = collageState[imgData.id] || {dx:0, dy:0, scale: 1};
                                const scale = state.scale || 1;
                                drawWidth *= scale;
                                drawHeight *= scale;

                                const offsetX = (drawWidth - exportRect.cw) / 2;
                                const offsetY = (drawHeight - exportRect.ch) / 2;

                                const scaledDx = state.dx * scaleX;
                                const scaledDy = state.dy * scaleY;

                                ctx.drawImage(img, exportRect.cx - offsetX + scaledDx, exportRect.cy - offsetY + scaledDy, drawWidth, drawHeight);
                                ctx.filter = 'none';

                                if (collageSettings.showNames && imgData.nameText) {
                                    const fontSize = (collageSettings.textSize || 40) * scaleY;
                                    ctx.font = `bold ${fontSize}px ${collageSettings.textFont || 'Arial'}`;
                                    const pos = collageSettings.textPosition || 'bottom-center';
                                    
                                    let tx = exportRect.cx + exportRect.cw / 2;
                                    let ty = exportRect.cy + exportRect.ch / 2;
                                    ctx.textAlign = 'center';

                                    if (pos.includes('top')) ty = exportRect.cy + fontSize + (15 * scaleY);
                                    else if (pos.includes('bottom')) ty = exportRect.cy + exportRect.ch - fontSize - (15 * scaleY);
                                    if (pos.includes('left')) { tx = exportRect.cx + (20 * scaleX); ctx.textAlign = 'left'; }
                                    else if (pos.includes('right')) { tx = exportRect.cx + exportRect.cw - (20 * scaleX); ctx.textAlign = 'right'; }

                                    if (state.textX !== undefined && state.textX !== null) tx = state.textX * scaleX;
                                    if (state.textY !== undefined && state.textY !== null) ty = state.textY * scaleY;

                                    ctx.shadowColor = "rgba(0,0,0,0.9)";
                                    ctx.shadowBlur = 10 * scaleX;
                                    ctx.shadowOffsetX = 2 * scaleX;
                                    ctx.shadowOffsetY = 2 * scaleY;

                                    ctx.fillStyle = collageSettings.textColor || '#000000';
                                    ctx.textBaseline = 'middle';
                                    ctx.fillText(imgData.nameText, tx, ty);
                                }

                                ctx.restore();
                                resolve();
                            };
                            img.onerror = reject;
                            img.src = imgData.originalUrl; 
                        });
                    }

                    canvas.toBlob((blob) => {
                        if (blob) {
                            const file = new File([blob], `Collage_${Date.now()}.jpg`, { type: 'image/jpeg' });
                            const newUrl = URL.createObjectURL(blob);
                            
                            const newCollageImage = {
                                id: Date.now(),
                                isCollage: true,
                                file: file,
                                originalUrl: newUrl,
                                nameText: 'My Collage',
                                fileType: 'image/jpeg',
                                fileExt: 'jpg',
                                brightness: 100,
                                contrast: 100,
                                saturation: 100,
                                eraserStrokes: [],
                                redoStrokes: [],
                                customWatermarkPos: null
                            };

                            setImages(prev => [newCollageImage, ...prev.filter(img => !img.isCollage)]);
                            setActiveImageId(newCollageImage.id);
                            setIsCollageMode(false); 
                            showToast("Collage Saved Successfully!", "success");
                        }
                    }, 'image/jpeg', 0.95);

                } catch (err) {
                    console.error(err);
                    showToast("Failed to create collage.", "error");
                } finally {
                    setIsCreatingCollage(false);
                }
            };


            const getExportQuality = () => {
                let quality = 1.0;
                if (compression.enabled && compression.targetMB && parseFloat(compression.targetMB) > 0) {
                    const targetBytes = parseFloat(compression.targetMB) * 1024 * 1024;
                    const totalOriginalBytes = images.reduce((acc, i) => acc + i.file.size, 0);
                    if (totalOriginalBytes > 0) quality = Math.min(1.0, Math.max(0.1, targetBytes / totalOriginalBytes)); 
                }
                return quality;
            };

            const processCanvasForDownload = (img, resolve, reject, isPdf = false, pdf, index, quality) => {
                const imageObj = new Image();
                imageObj.crossOrigin = "anonymous";
                const freshUrl = URL.createObjectURL(img.file);

                imageObj.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = imageObj.naturalWidth;
                    canvas.height = imageObj.naturalHeight;
                    const ctx = canvas.getContext('2d');

                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.filter = `brightness(${img.brightness}%) contrast(${img.contrast}%) saturate(${img.saturation}%)`;
                    ctx.drawImage(imageObj, 0, 0, canvas.width, canvas.height);
                    ctx.filter = 'none';

                    applyEraserStrokes(ctx, canvas, img.eraserStrokes);

                    if (globalSettings.showWatermark && img.nameText) {
                        ctx.save();
                        const fontSize = (globalSettings.fontSize / 100) * canvas.height;
                        ctx.font = `bold ${fontSize}px ${globalSettings.fontFamily}`;
                        ctx.fillStyle = globalSettings.color;
                        ctx.globalAlpha = globalSettings.opacity / 100;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = "rgba(0,0,0,0.8)";
                        ctx.shadowBlur = 12;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;

                        let x = canvas.width / 2;
                        let y = canvas.height / 2;
                        
                        if (img.customWatermarkPos) {
                            x = img.customWatermarkPos.x;
                            y = img.customWatermarkPos.y;
                        } else {
                            const activePosition = globalSettings.position;
                            if (activePosition.includes('top')) y = fontSize + 20;
                            else if (activePosition.includes('bottom')) y = canvas.height - fontSize - 20;
                            
                            if (activePosition.includes('left')) { x = 20; ctx.textAlign = 'left'; }
                            else if (activePosition.includes('right')) { x = canvas.width - 20; ctx.textAlign = 'right'; }
                        }

                        ctx.fillText(img.nameText, x, y);
                        ctx.restore();
                    }

                    if (isPdf && pdf) {
                        const dataUrl = canvas.toDataURL("image/jpeg", quality);
                        const pdfWidth = pdf.internal.pageSize.getWidth();
                        const pdfHeight = pdf.internal.pageSize.getHeight();
                        const imgRatio = canvas.width / canvas.height;
